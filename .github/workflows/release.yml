name: Release AAB (Play Store)

# Builds a SIGNED Android App Bundle (.aab) for Google Play, using the upload
# keystore stored in the repo secrets. Trigger manually from the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: write   # to publish the .aab as a release asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode upload keystore
        env:
          KS_B64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Generate Gradle wrapper (8.13)
        # Generated in a scratch directory: running the runner's own Gradle inside this
        # project would configure it, and that Gradle is too new for our AGP.
        run: |
          mkdir -p /tmp/wrapgen
          touch /tmp/wrapgen/settings.gradle
          cd /tmp/wrapgen && gradle wrapper --gradle-version 8.13
          cp -r /tmp/wrapgen/gradle/wrapper/gradle-wrapper.jar $GITHUB_WORKSPACE/gradle/wrapper/
          cp /tmp/wrapgen/gradlew /tmp/wrapgen/gradlew.bat $GITHUB_WORKSPACE/
          chmod +x $GITHUB_WORKSPACE/gradlew

      - name: Build signed AAB
        env:
          UPLOAD_STORE_FILE: ${{ runner.temp }}/upload-keystore.jks
          UPLOAD_STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Publish AAB to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aab-v${{ github.run_number }}
          name: POS Billing AAB v${{ github.run_number }}
          body: |
            Signed Play Store App Bundle built from commit ${{ github.sha }}.
            Upload `app-release.aab` to the Google Play Console.
          files: app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: pos-billing-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
