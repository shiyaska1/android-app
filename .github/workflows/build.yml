name: Build APK

# Build the debug APK in the cloud on every push, and on-demand from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper (8.9)
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true   # artifact storage quota can fill up; Release below is the reliable path
        with:
          name: pos-billing-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: POS Billing v${{ github.run_number }}
          body: |
            Debug APK built automatically from commit ${{ github.sha }}.
            Download `app-debug.apk` below and install it on your Android device.
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
