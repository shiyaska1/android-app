name: Gen Keystore

# One-shot: generates a stable signing keystore and uploads it as an artifact.
# After the artifact is committed to the repo, this workflow is deleted.
on:
  push:
    paths:
      - '.github/workflows/gen-keystore.yml'
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -storepass poskey123 -keypass poskey123 \
            -alias posbilling -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=POS Billing, O=POS Billing, L=NA, ST=NA, C=IN"

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: keystore.jks
          if-no-files-found: error
