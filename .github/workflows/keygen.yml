name: Generate upload keystore

# One-time: creates the Play Store upload keystore from the password secrets and
# publishes it (jks + base64) as a build artifact to download. Run once, save the
# keystore safely, then never run again (a new key can't update an existing app).
on:
  workflow_dispatch:

jobs:
  keygen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        env:
          KS_PASS: ${{ secrets.UPLOAD_STORE_PASSWORD }}
          KEY_PASS: ${{ secrets.UPLOAD_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
        run: |
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            -dname "CN=POS Billing, OU=Mobile, O=POS Billing, L=NA, S=NA, C=IN"
          base64 -w0 upload-keystore.jks > upload-keystore.b64

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: |
            upload-keystore.jks
            upload-keystore.b64
          if-no-files-found: error
